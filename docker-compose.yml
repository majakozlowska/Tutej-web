version: '3.8'

services:
    db:
        image: postgres:15
        restart: always
        environment:
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
            POSTGRES_DB: tutej
        ports:
            - '5432:5432'
        volumes:
            - db-data:/var/lib/postgresql/data

    server:
        build: ./server
        ports:
            - '5000:5000'
        volumes:
            - ./server:/usr/src/app
            - /usr/src/app/node_modules
        environment:
            DATABASE_URL: postgresql://user:password@db:5432/tutej
        depends_on:
            - db

    client:
        build: ./client
        ports:
            - '5173:5173'
        volumes:
            - ./client:/usr/src/app
            - /usr/src/app/node_modules
        stdin_open: true
        tty: true

volumes:
    db-data:
